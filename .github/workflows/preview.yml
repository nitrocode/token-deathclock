name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Serialize gh-pages pushes per PR; cancel in-progress runs when a new push arrives.
concurrency:
  group: "pages-preview-${{ github.event.number }}"
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Build all generated files
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Capture desktop and mobile screenshots
        run: npm run screenshots

      - name: Deploy PR preview to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch the existing gh-pages branch (silently skip if it doesn't exist yet)
          git fetch origin gh-pages:refs/remotes/origin/gh-pages 2>/dev/null || true

          # Check out gh-pages into a worktree so we can update it in-place.
          # This preserves production files and other previews — equivalent to keep_files: true.
          if git rev-parse --verify refs/remotes/origin/gh-pages >/dev/null 2>&1; then
            git branch --force gh-pages refs/remotes/origin/gh-pages
            git worktree add /tmp/gh-pages gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          DEST="/tmp/gh-pages/previews/pr-${{ github.event.number }}"
          mkdir -p "$DEST"

          # Sync built files into the preview subdirectory.
          # Keep the exclude list in sync with deploy.yml (screenshots is an additional
          # preview-only exclusion: they are uploaded via the Content API in the next step,
          # so rsync must not overwrite them before that step runs).
          # .gitignore is excluded so it never lands in gh-pages; if it did,
          # `git add -A` would silently skip script.js, styles.css and the
          # generated data files (all listed in .gitignore).
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='scripts' \
            --exclude='package-lock.json' \
            --exclude='package.json' \
            --exclude='milestones.yaml' \
            --exclude='project-stats.yaml' \
            --exclude='screenshots' \
            ./ "$DEST/"

          cd /tmp/gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to deploy — preview is already up to date"
          else
            git commit -m "chore: deploy preview for PR #${{ github.event.number }}"
            git push origin gh-pages
          fi

      - name: Upload screenshots to GitHub
        id: upload-screenshots
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const branch = 'gh-pages';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const name of ['desktop', 'mobile']) {
              const localPath = `screenshots/${name}.png`;
              const ghPath = `previews/pr-${prNumber}/screenshots/${name}.png`;
              const content = fs.readFileSync(localPath, { encoding: 'base64' });

              let sha;
              try {
                const { data } = await github.rest.repos.getContent({
                  owner, repo, path: ghPath, ref: branch,
                });
                sha = data.sha;
              } catch (err) {
                // A 404 means the file doesn't exist yet — that's expected on the
                // first run. Re-throw anything else (auth errors, network failures).
                if (err.status !== 404) throw err;
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner, repo,
                path: ghPath,
                message: `chore: update ${name} screenshot for PR #${prNumber}`,
                content,
                branch,
                ...(sha ? { sha } : {}),
              });

              core.setOutput(`${name}_url`,
                `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${ghPath}`);
            }

      - name: Post or update preview URL comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DESKTOP_URL: ${{ steps.upload-screenshots.outputs.desktop_url }}
          MOBILE_URL: ${{ steps.upload-screenshots.outputs.mobile_url }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const url = `https://nitrocode.github.io/token-deathclock/previews/pr-${prNumber}/`;
            const desktopUrl = process.env.DESKTOP_URL;
            const mobileUrl = process.env.MOBILE_URL;
            const body = [
              '## 👁️ PR Preview',
              '',
              `🚀 **[Open Preview](${url})**`,
              '',
              `> Deployed from commit \`${sha}\` · Updates on every push to this PR`,
              '> _(Preview is removed automatically when the PR is closed.)_',
              '',
              '### Screenshots',
              '',
              '| Desktop | Mobile |',
              '|:-------:|:------:|',
              `| ![Desktop](${desktopUrl}) | ![Mobile](${mobileUrl}) |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 👁️ PR Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
