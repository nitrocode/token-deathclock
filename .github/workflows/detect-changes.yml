name: Detect Relevant Changes

# Reusable workflow — determines whether relevant source files (JS/TS/CSS, tests,
# package manifests) were modified between the base and HEAD commits.
#
# Usage in a calling workflow:
#
#   jobs:
#     changes:
#       uses: ./.github/workflows/detect-changes.yml
#       with:
#         event_name: ${{ github.event_name }}
#         always_run: ${{ github.event_name == 'schedule' }}   # optional
#
#   test:
#     needs: changes
#     if: needs.changes.outputs.code == 'true'
#
# Why event_name is a required input:
#   Inside a reusable workflow triggered via workflow_call, github.event_name is
#   always "workflow_call", not the original triggering event (push/pull_request/…).
#   The caller must pass the real event name so the paths-filter action can resolve
#   the correct base SHA from the inherited github.event payload.

on:
  workflow_call:
    inputs:
      event_name:
        description: >
          The event name from the calling workflow (github.event_name).
          Required because github.event_name is always "workflow_call" inside a
          reusable workflow, not the original triggering event.
        required: true
        type: string
      always_run:
        description: >
          When true, skip the diff check and unconditionally output code=true.
          Use this for scheduled runs where there is no diff to compare against.
        required: false
        type: boolean
        default: false
    outputs:
      code:
        description: >
          "true" when relevant source files changed (or always_run is set);
          "false" when no relevant changes were detected.
        value: ${{ jobs.detect.outputs.code }}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.result.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history is required so the base commit is reachable for git diff.
          fetch-depth: 0

      - name: Filter changed paths
        if: ${{ !inputs.always_run }}
        id: filter
        uses: ./.github/actions/paths-filter
        with:
          event_name: ${{ inputs.event_name }}
          filters: |
            code:
              - '**/*.js'
              - '**/*.ts'
              - '**/*.css'
              - '.github/actions/**/*.sh'
              - '.github/actions/**/*.yml'
              - '.github/actions/**/*.yaml'
              - '.github/scripts/**/*.sh'
              - '.github/workflows/**/*.yml'
              - '.github/workflows/**/*.yaml'
              - 'tests/**'
              - 'package*.json'

      - name: Set result
        id: result
        # Use env: to pass outputs safely — avoids any interpolation concern
        # on the always_run boolean and the filter output string.
        env:
          ALWAYS_RUN: ${{ inputs.always_run }}
          FILTER_CODE: ${{ steps.filter.outputs.code }}
        run: |
          if [[ "${ALWAYS_RUN}" == "true" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            # Validate that FILTER_CODE is exactly 'true' or 'false' so an
            # unexpected value from the filter step never silently propagates.
            if [[ "${FILTER_CODE}" != "true" && "${FILTER_CODE}" != "false" ]]; then
              echo "Unexpected FILTER_CODE value: '${FILTER_CODE}' — defaulting to true" >&2
              echo "code=true" >> "$GITHUB_OUTPUT"
            else
              echo "code=${FILTER_CODE}" >> "$GITHUB_OUTPUT"
            fi
          fi

