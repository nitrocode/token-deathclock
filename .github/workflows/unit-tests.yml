name: Unit Tests

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      # On scheduled runs there is no diff to compare — always run tests.
      # On push/PR, only run when relevant files changed.
      code: ${{ github.event_name == 'schedule' || steps.filter.outputs.code == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        if: github.event_name != 'schedule'
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
          else
            BASE="${{ github.event.merge_group.base_sha }}"
          fi
          # On a new branch (no prior commit) or unknown base, always run tests
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" \
              | grep -qE '\.(js|ts|css)$|^tests/|^package[^/]*\.json$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Build generated files needed for tests
        run: npm run build:milestones && npm run build:js

      - name: Run type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit
          verbose: true
          fail_ci_if_error: false

  unit-test-status:
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Unit tests failed"
            exit 1
          fi
          echo "Unit tests passed or were skipped (no relevant files changed)"
