name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one production deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://nitrocode.github.io/token-deathclock/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Build all generated files
        run: npm run build

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: ./.github/actions/gh-pages-deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          commit_message: "chore: deploy ${{ github.sha }} to gh-pages"
          exclude_assets: |
            .git
            .github
            .gitignore
            node_modules
            tests
            scripts
            package-lock.json
            package.json
            milestones.yaml
            project-stats.yaml
