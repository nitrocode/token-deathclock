name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one production deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://nitrocode.github.io/token-deathclock/
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate milestones-data.js from YAML
        run: npm run build:milestones

      - name: Regenerate changelog-data.js from CHANGELOG.md
        run: npm run build:changelog

      - name: Regenerate project-stats-data.js from YAML
        run: npm run build:project-stats

      - name: Rebuild script.js from src/js/ source files
        run: npm run build:js

      - name: Rebuild styles.css from styles/ source files
        run: npm run build:css

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          # Preserve any existing PR preview directories across production deploys
          keep_files: true
          # Exclude non-site files from the deployment.
          # Keep this list in sync with the exclude_assets in preview.yml
          # (.gitignore and screenshots are additional preview-only exclusions).
          exclude_assets: '.github,.gitignore,node_modules,tests,scripts,package-lock.json,package.json,milestones.yaml,project-stats.yaml'
