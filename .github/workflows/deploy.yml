name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one production deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://nitrocode.github.io/token-deathclock/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate milestones-data.js from YAML
        run: npm run build:milestones

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          # Preserve any existing PR preview directories across production deploys
          keep_files: true
          # Exclude non-site files from the deployment
          exclude_assets: '.github,node_modules,tests,scripts,package-lock.json,package.json,milestones.yaml'
