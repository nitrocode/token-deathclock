name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect relevant file changes
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
          else
            BASE="${{ github.event.merge_group.base_sha }}"
          fi
          # On a new branch (no prior commit) or unknown base, always run tests
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE" "${{ github.sha }}" \
              | grep -qE '\.(js|ts|css)$|^tests/|^package[^/]*\.json$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test-e2e:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build generated files
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

  e2e-test-status:
    needs: [changes, test-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          if [[ "${{ needs.test-e2e.result }}" == "failure" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "E2E tests passed or were skipped (no relevant files changed)"
