name: 'Setup Node.js environment'
description: 'Configure Node.js 22 with npm cache and install dependencies'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash
